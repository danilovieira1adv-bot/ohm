version: '3.8'

services:
  backend:
    build: ./backend
    container_name: ohm-backend
    restart: unless-stopped
    ports:
      - "4101:4001"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=4001
    networks:
      - ohm-net

  frontend:
    build: ./frontend
    container_name: ohm-frontend
    restart: unless-stopped
    ports:
      - "4100:4000"
    networks:
      - ohm-net

networks:
  ohm-net:
    driver: bridge
