server {
  listen 4000;
  root /usr/share/nginx/html;

  location = /landing {
    try_files /landpage_v3.html =404;
  }

  location = /dashboard.html {
    try_files /dashboard.html =404;
  }

  location /assets/ {
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
